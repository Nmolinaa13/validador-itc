<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Validador ITC + BDM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-mid: #AFA9EC;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --amber: #EF9F27;
    --amber-light: #FAEEDA;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --gray-50: #F7F6F3;
    --gray-100: #EDECE8;
    --gray-200: #D3D1C7;
    --gray-400: #888780;
    --gray-700: #444441;
    --gray-900: #1C1C1A;
    --bg: #F4F3EF;
    --card: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--gray-900);
    min-height: 100vh;
    padding: 0;
  }

  /* Top bar */
  .topbar {
    background: var(--gray-900);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-title { font-size: 14px; font-weight: 500; letter-spacing: 0.02em; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .score-pill {
    font-family: var(--mono);
    font-size: 13px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 99px;
    padding: 4px 14px;
    color: #fff;
    transition: all 0.3s;
  }
  .score-pill.good { background: rgba(29,158,117,0.25); border-color: rgba(29,158,117,0.5); color: #5DCAA5; }
  .score-pill.warn { background: rgba(239,159,39,0.25); border-color: rgba(239,159,39,0.5); color: var(--amber); }
  .score-pill.danger { background: rgba(226,75,74,0.25); border-color: rgba(226,75,74,0.5); color: #F09995; }

  /* API key banner */
  .api-banner {
    background: var(--amber-light);
    border-bottom: 1px solid rgba(239,159,39,0.3);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #633806;
  }
  .api-banner input {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid rgba(239,159,39,0.4);
    border-radius: 6px;
    background: #fff;
    color: var(--gray-900);
  }
  .api-banner button {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    background: var(--amber);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  /* Progress track */
  .progress-section {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }
  .step-tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .step-tab {
    flex: 1;
    min-width: 80px;
    padding: 8px 4px;
    border-radius: 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-400);
    border: 1px solid transparent;
    cursor: default;
    transition: all 0.25s;
    position: relative;
  }
  .step-tab .tab-num {
    display: block;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 400;
    color: var(--gray-200);
    margin-bottom: 2px;
    transition: all 0.25s;
  }
  .step-tab.done { color: var(--teal); }
  .step-tab.done .tab-num { color: var(--teal); }
  .step-tab.active { background: var(--purple-light); border-color: rgba(83,74,183,0.2); color: var(--purple); }
  .step-tab.active .tab-num { color: var(--purple); }
  .progress-bar-wrap { height: 3px; background: var(--gray-100); border-radius: 99px; margin-top: 12px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--purple), var(--teal)); transition: width 0.5s ease; }

  /* Main content */
  .main { max-width: 680px; margin: 0 auto; padding: 28px 20px 80px; }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-header { margin-bottom: 20px; }
  .card-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 99px;
    background: var(--purple-light);
    color: var(--purple);
    margin-bottom: 8px;
  }
  .card-title { font-size: 17px; font-weight: 600; color: var(--gray-900); }
  .card-sub { font-size: 13px; color: var(--gray-400); margin-top: 3px; line-height: 1.5; }

  /* Fields */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 6px;
  }
  .field label .tip {
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    color: var(--gray-200);
  }
  .field input, .field textarea, .field select {
    width: 100%;
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    padding: 10px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    background: var(--gray-50);
    color: var(--gray-900);
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(83,74,183,0.1);
    background: #fff;
  }
  .field input.err, .field textarea.err { border-color: var(--red); box-shadow: 0 0 0 3px rgba(226,75,74,0.08); }
  .field input.ok, .field textarea.ok { border-color: var(--teal); }

  /* Congruence alert */
  .cong-alert {
    margin-top: 6px;
    padding: 8px 12px;
    background: var(--amber-light);
    border-left: 3px solid var(--amber);
    border-radius: 0 8px 8px 0;
    font-size: 12px;
    color: #633806;
  }

  /* Rating */
  .rating-group { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .rating-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .rating-label { font-size: 13px; font-weight: 600; color: var(--gray-900); margin-bottom: 3px; }
  .rating-q { font-size: 12px; color: var(--gray-400); margin-bottom: 10px; line-height: 1.5; }
  .stars { display: flex; gap: 5px; margin-bottom: 8px; }
  .star {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border-strong);
    background: var(--gray-50);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-400);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    user-select: none;
  }
  .star:hover { background: var(--purple-light); border-color: var(--purple-mid); color: var(--purple); }
  .star.on { background: var(--purple); border-color: var(--purple); color: #fff; }
  .just-input {
    width: 100%; font-family: var(--font); font-size: 12px;
    padding: 7px 11px; border: 1px solid var(--border-strong); border-radius: 8px;
    background: var(--gray-50); color: var(--gray-900); resize: none;
  }
  .just-input:focus { outline: none; border-color: var(--purple); background: #fff; }

  /* Semaphore */
  .semaphore { display: flex; gap: 8px; margin: 16px 0; }
  .sem { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid; text-align: center; font-size: 11px; font-weight: 600; opacity: 0.35; transition: opacity 0.3s; }
  .sem.on { opacity: 1; }
  .sem-r { background: var(--red-light); border-color: rgba(226,75,74,0.3); color: #791F1F; }
  .sem-y { background: var(--amber-light); border-color: rgba(239,159,39,0.3); color: #633806; }
  .sem-g { background: var(--teal-light); border-color: rgba(29,158,117,0.3); color: #085041; }
  .sem-score { font-size: 22px; font-weight: 300; font-family: var(--mono); display: block; margin-bottom: 2px; }

  /* AI feedback */
  .ai-bubble {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    border: 1px solid;
  }
  .ai-bubble.loading { background: var(--purple-light); border-color: rgba(83,74,183,0.2); color: var(--purple); }
  .ai-bubble.info { background: var(--purple-light); border-color: rgba(83,74,183,0.2); color: #3C3489; }
  .ai-bubble.warn { background: var(--amber-light); border-color: rgba(239,159,39,0.3); color: #633806; }
  .ai-bubble.danger { background: var(--red-light); border-color: rgba(226,75,74,0.2); color: #791F1F; }
  .ai-bubble.success { background: var(--teal-light); border-color: rgba(29,158,117,0.3); color: #085041; }
  .ai-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: pulse 1.1s ease-in-out infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* Trophy */
  .trophy-block { text-align: center; padding: 24px 0 8px; }
  .trophy-em { font-size: 56px; display: block; margin-bottom: 10px; }
  .trophy-title { font-size: 20px; font-weight: 600; }
  .trophy-score { font-family: var(--mono); font-size: 42px; font-weight: 300; color: var(--gray-900); margin: 8px 0 2px; }
  .trophy-sub { font-size: 13px; color: var(--gray-400); }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
  .btn {
    font-family: var(--font); font-size: 14px; font-weight: 500;
    padding: 10px 22px; border-radius: 10px; cursor: pointer;
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-ghost { background: transparent; border: 1px solid var(--border-strong); color: var(--gray-700); }
  .btn-ghost:hover { background: var(--gray-50); }
  .btn-primary { background: var(--purple); border: 1px solid var(--purple); color: #fff; }
  .btn-primary:hover { background: #3C3489; }
  .btn-teal { background: var(--teal); border: 1px solid var(--teal); color: #fff; }
  .btn-teal:hover { background: #0F6E56; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  @media (max-width: 480px) {
    .main { padding: 16px 12px 80px; }
    .card { padding: 16px; }
    .topbar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="topbar-title">Validador · ITC + BDM</span>
  <div class="topbar-right">
    <div class="score-pill" id="score-pill">0 / 20 pts</div>
  </div>
</div>

<!-- API Key banner -->
<div class="api-banner" id="api-banner">
  <span style="white-space:nowrap;font-weight:500;">🔑 API Key:</span>
  <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off"/>
  <button onclick="saveKey()">Guardar</button>
  <span id="key-status" style="white-space:nowrap"></span>
</div>

<!-- Progress -->
<div class="progress-section">
  <div class="step-tabs" id="step-tabs"></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="main" id="main-content"></div>

<script>
const STEPS = [
  { id:'intro',       label:'Proyecto',    icon:'01' },
  { id:'diagnostico', label:'Diagnóstico', icon:'02' },
  { id:'propuesta',   label:'Propuesta',   icon:'03' },
  { id:'matriz',      label:'Matriz',      icon:'04' },
  { id:'riesgos',     label:'Riesgos',     icon:'05' },
  { id:'cierre',      label:'Resultado',   icon:'06' },
];

const state = {
  step: 0,
  apiKey: '',
  data: {},
  ratings: { causalidad:0, plausibilidad:0, seguridad:0, sostenibilidad:0 },
  just: { causalidad:'', plausibilidad:'', seguridad:'', sostenibilidad:'' },
};

function saveKey() {
  const v = document.getElementById('api-key-input').value.trim();
  if(!v.startsWith('sk-ant')) {
    document.getElementById('key-status').textContent = '⚠ Verifica el formato';
    return;
  }
  state.apiKey = v;
  document.getElementById('key-status').textContent = '✓ Guardada';
  document.getElementById('key-status').style.color = '#0F6E56';
}

function totalScore() {
  return Object.values(state.ratings).reduce((a,b)=>a+b,0);
}

function updateScorePill() {
  const s = totalScore();
  const pill = document.getElementById('score-pill');
  pill.textContent = s + ' / 20 pts';
  pill.className = 'score-pill' + (s>=16?' good':s>=11?' warn':s>0?' danger':'');
}

function buildTabs() {
  document.getElementById('step-tabs').innerHTML = STEPS.map((s,i)=>{
    let cls = 'step-tab';
    if(i < state.step) cls += ' done';
    else if(i === state.step) cls += ' active';
    return `<div class="${cls}"><span class="tab-num">${i < state.step ? '✓' : s.icon}</span>${s.label}</div>`;
  }).join('');
  const pct = Math.round((state.step / (STEPS.length-1))*100);
  document.getElementById('prog-fill').style.width = pct+'%';
}

function fv(id) { return (state.data[id]||'').trim(); }

function field(id, label, tip, placeholder, rows) {
  const val = state.data[id]||'';
  if(rows) {
    return `<div class="field"><label>${label} <span class="tip">${tip||''}</span></label>
    <textarea id="f_${id}" rows="${rows}" placeholder="${placeholder}" oninput="state.data['${id}']=this.value;clearErr('${id}')">${val}</textarea></div>`;
  }
  return `<div class="field"><label>${label} <span class="tip">${tip||''}</span></label>
  <input type="text" id="f_${id}" value="${val}" placeholder="${placeholder}" oninput="state.data['${id}']=this.value;clearErr('${id}')"/></div>`;
}

function clearErr(id) {
  const el = document.getElementById('f_'+id);
  if(el) el.classList.remove('err');
}

function markErr(id) {
  const el = document.getElementById('f_'+id);
  if(el) { el.classList.add('err'); el.focus(); }
}

function showCong(id, msg) {
  const el = document.getElementById('f_'+id);
  if(!el) return;
  let a = el.parentNode.querySelector('.cong-alert');
  if(!a){ a=document.createElement('div'); a.className='cong-alert'; el.after(a); }
  a.textContent = '⚠ '+msg;
}

function clearCong(id) {
  const el = document.getElementById('f_'+id);
  if(!el) return;
  const a = el.parentNode.querySelector('.cong-alert');
  if(a) a.remove();
}

function validateStep() {
  if(state.step===0) {
    const n = fv('nombre_proyecto'), o = fv('outcome');
    if(!n){ markErr('nombre_proyecto'); return false; }
    if(!o){ markErr('outcome'); return false; }
    if(n.toLowerCase()===o.toLowerCase()){ showCong('outcome','El nombre y el outcome no pueden ser idénticos. El outcome debe describir el cambio esperado, no el nombre del proyecto.'); return false; }
    clearCong('outcome');
  }
  if(state.step===1) {
    for(const f of ['driver','compromiso_oculto','gran_suposicion']) {
      if(!fv(f)){ markErr(f); return false; }
    }
    const outcome = fv('outcome').toLowerCase().split(' ')[0];
    const comp = fv('compromiso_oculto').toLowerCase();
    if(outcome.length>4 && comp.startsWith(outcome)) {
      showCong('compromiso_oculto','El compromiso oculto parece repetir el outcome. Debe ser el competidor interno, no el objetivo mismo.'); return false;
    }
    clearCong('compromiso_oculto');
  }
  if(state.step===2) {
    if(!fv('accion_desbloqueo')){ markErr('accion_desbloqueo'); return false; }
    if(!fv('logica_causal')){ markErr('logica_causal'); return false; }
    if(!fv('compromiso_oculto') && fv('logica_causal').length>0) {
      showCong('logica_causal','Asegúrate de haber definido el compromiso oculto antes de trazar la lógica causal.'); return false;
    }
  }
  if(state.step===3) {
    for(const c of ['causalidad','plausibilidad','seguridad','sostenibilidad']) {
      if(!state.ratings[c]) { showAiBubble('mat-fb','Califica todos los criterios antes de continuar.','warn'); return false; }
    }
  }
  if(state.step===4) {
    if(!fv('supuesto_clave')){ markErr('supuesto_clave'); return false; }
  }
  return true;
}

function showAiBubble(id, msg, type) {
  const el = document.getElementById(id);
  if(el) el.innerHTML = `<div class="ai-bubble ${type}">${msg}</div>`;
}

async function callAI(prompt, containerId, thenFn) {
  const el = document.getElementById(containerId);
  if(!el) return thenFn&&thenFn();
  if(!state.apiKey) {
    el.innerHTML = '<div class="ai-bubble warn">⚠ Agrega tu API key en la barra superior para obtener feedback de IA.</div>';
    return thenFn&&thenFn();
  }
  el.innerHTML = '<div class="ai-bubble loading"><span class="ai-dot"></span>Analizando tu propuesta…</div>';
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:800, messages:[{role:'user',content:prompt}] })
    });
    const d = await r.json();
    if(d.error){ el.innerHTML=`<div class="ai-bubble warn">Error API: ${d.error.message}</div>`; return thenFn&&thenFn(); }
    const text = d.content?.map(b=>b.text||'').join('')||'Sin respuesta.';
    el.innerHTML = `<div class="ai-bubble info">${text.replace(/\n\n/g,'</p><p style="margin-top:8px">').replace(/\n/g,'<br>')}</div>`;
  } catch(e) {
    el.innerHTML = '<div class="ai-bubble warn">No se pudo conectar. Revisa tu API key o tu conexión.</div>';
  }
  thenFn&&thenFn();
}

function buildPrompt(step) {
  const d = state.data, r = state.ratings;
  const base = `Proyecto: ${d.nombre_proyecto}\nOutcome: ${d.outcome}`;
  if(step===1) return `Eres coach experto en Immunity to Change (ITC) y Behavior Drivers Model (BDM) de UNICEF. Analiza este diagnóstico y da retroalimentación en 3-4 oraciones directas. Señala incongruencias si las hay — especialmente si el compromiso oculto no compite realmente con el outcome, o si la Gran Suposición es muy vaga.\n\n${base}\nDriver BDM: ${d.driver}\nCompromiso oculto: ${d.compromiso_oculto}\nGran Suposición: ${d.gran_suposicion}`;
  if(step===2) return `Evalúa esta propuesta de intervención ITC+BDM. ¿La acción de desbloqueo realmente ataca la inmunidad interna? ¿La lógica causal es coherente? ¿Hay riesgo de efecto rebote? Responde en 3-4 oraciones.\n\n${base}\nCompromiso oculto: ${d.compromiso_oculto}\nGran Suposición: ${d.gran_suposicion}\nAcción de desbloqueo: ${d.accion_desbloqueo}\nLógica causal: ${d.logica_causal}`;
  if(step===3) return `El equipo calificó su propuesta en la Matriz de Validación:\n- Causalidad: ${r.causalidad}/5 — "${d.just_causalidad||state.just.causalidad}"\n- Plausibilidad: ${r.plausibilidad}/5 — "${d.just_plausibilidad||state.just.plausibilidad}"\n- Seguridad Psicológica: ${r.seguridad}/5 — "${d.just_seguridad||state.just.seguridad}"\n- Sostenibilidad: ${r.sostenibilidad}/5 — "${d.just_sostenibilidad||state.just.sostenibilidad}"\n- Total: ${totalScore()}/20\n\nPropuesta: "${d.accion_desbloqueo}"\n\n¿Las calificaciones son coherentes con la propuesta? ¿Algún criterio parece sobreestimado? Da feedback honesto y útil en 3-4 oraciones.`;
  if(step===5) return `Analiza esta ficha completa de validación ITC+BDM y da un diagnóstico final de 5-6 oraciones. Nombra las fortalezas y los 1-2 puntos más críticos a resolver antes de ejecutar.\n\n${base}\nDriver BDM: ${d.driver}\nCompromiso oculto: ${d.compromiso_oculto}\nGran Suposición: ${d.gran_suposicion}\nAcción de desbloqueo: ${d.accion_desbloqueo}\nLógica causal: ${d.logica_causal}\nSupuesto clave: ${d.supuesto_clave}\nRiesgo rebote: ${d.riesgo_rebote||'No especificado'}\nPuntajes: Causalidad ${r.causalidad}/5, Plausibilidad ${r.plausibilidad}/5, Seguridad ${r.seguridad}/5, Sostenibilidad ${r.sostenibilidad}/5. Total: ${totalScore()}/20`;
  return '';
}

function setRating(criterion, val) {
  state.ratings[criterion] = val;
  document.querySelectorAll(`#stars_${criterion} .star`).forEach((s,i)=>s.classList.toggle('on',i<val));
  updateScorePill();
  updateSemaphore();
}

function updateSemaphore() {
  const s = totalScore();
  const r = document.getElementById('sem-r');
  const y = document.getElementById('sem-y');
  const g = document.getElementById('sem-g');
  if(!r) return;
  r.classList.toggle('on', s>=1&&s<=10);
  y.classList.toggle('on', s>=11&&s<=15);
  g.classList.toggle('on', s>=16);
  const el = document.getElementById('mat-score');
  if(el) el.textContent = s;
}

function renderStep() {
  const c = document.getElementById('main-content');
  const s = STEPS[state.step];

  if(s.id==='intro') {
    c.innerHTML = `<div class="card">
      <div class="card-header">
        <span class="card-tag">Paso 1 · Proyecto</span>
        <div class="card-title">Identidad de la propuesta</div>
        <div class="card-sub">Define el punto de partida antes de hacer el diagnóstico</div>
      </div>
      ${field('nombre_proyecto','Nombre del proyecto','','Ej: Jóvenes comunicadores del territorio')}
      ${field('outcome','Outcome','— el cambio observable que buscas','Ej: Los líderes comunitarios delegan activamente la comunicación digital a los jóvenes',3)}
    </div>
    <div class="btn-row"><button class="btn btn-primary" onclick="goNext()">Continuar →</button></div>`;
  }

  if(s.id==='diagnostico') {
    c.innerHTML = `<div class="card">
      <div class="card-header">
        <span class="card-tag">Paso 2 · Diagnóstico</span>
        <div class="card-title">Rayos X: BDM + Immunity to Change</div>
        <div class="card-sub">¿Qué bloquea el cambio por fuera y por dentro?</div>
      </div>
      ${field('driver','Driver UNICEF priorizado','— factor y dimensión del BDM','Ej: Autoeficacia — el líder no cree que los jóvenes puedan hacerlo bien')}
      ${field('compromiso_oculto','Compromiso oculto (ITC)','— el competidor interno del cambio','Ej: "Me comprometo a sentirme indispensable porque temo que si los jóvenes lo hacen solos, mi rol pierde valor"',3)}
      ${field('gran_suposicion','La Gran Suposición','— la creencia que genera la inmunidad','Ej: "Si suelto el control y ellos lo hacen mejor que yo, la comunidad dejará de respetarme"',3)}
      <div id="diag-fb"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="goBack()">← Atrás</button>
      <button class="btn btn-primary" onclick="goNext()">Analizar con IA →</button>
    </div>`;
  }

  if(s.id==='propuesta') {
    c.innerHTML = `<div class="card">
      <div class="card-header">
        <span class="card-tag">Paso 3 · Propuesta</span>
        <div class="card-title">La ruta de intervención</div>
        <div class="card-sub">Diseña el desbloqueo y traza la lógica causal</div>
      </div>
      ${field('accion_desbloqueo','Acción de desbloqueo','— ¿cómo ataca el driver externo Y la inmunidad interna?','Ej: Crear el rol de "Mentor Senior" donde el valor del líder es validar la estrategia, no publicar',4)}
      ${field('logica_causal','Lógica causal (Teoría de Cambio)','— Si [acción], entonces [cambio], porque [mecanismo]','Ej: Si creamos el rol de Mentor Senior, entonces el líder siente que su conocimiento sigue siendo vital, y permite que los jóvenes operen las redes',4)}
      <div id="prop-fb"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="goBack()">← Atrás</button>
      <button class="btn btn-primary" onclick="goNext()">Analizar con IA →</button>
    </div>`;
  }

  if(s.id==='matriz') {
    const crit = [
      {id:'causalidad', label:'Causalidad', q:'¿La solución ataca la raíz del driver y el compromiso oculto del árbol de problemas?'},
      {id:'plausibilidad', label:'Plausibilidad', q:'¿Es realista en el tiempo? ¿Podré evaluarla? ¿Tenemos los recursos necesarios?'},
      {id:'seguridad', label:'Seguridad psicológica', q:'¿Permite desafiar la Gran Suposición sin exponer a la comunidad? ¿Habrá rechazo?'},
      {id:'sostenibilidad', label:'Sostenibilidad', q:'¿El cambio se mantendrá sin nuestra presencia una vez que la persona vea su inmunidad?'},
    ];
    c.innerHTML = `<div class="card">
      <div class="card-header">
        <span class="card-tag">Paso 4 · Matriz</span>
        <div class="card-title">Validación de calidad</div>
        <div class="card-sub">Califica del 1 al 5 cada criterio y justifica brevemente</div>
      </div>
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;">
        <span style="font-size:13px;color:var(--gray-400)">Puntaje total</span>
        <span style="font-family:var(--mono);font-size:32px;font-weight:300;color:var(--gray-900)"><span id="mat-score">${totalScore()}</span><span style="font-size:16px;color:var(--gray-400)">/20</span></span>
      </div>
      <div class="semaphore">
        <div class="sem sem-r ${totalScore()>=1&&totalScore()<=10?'on':''}" id="sem-r"><span class="sem-score">6–10</span>Ruta superficial</div>
        <div class="sem sem-y ${totalScore()>=11&&totalScore()<=15?'on':''}" id="sem-y"><span class="sem-score">11–15</span>Ruta frágil</div>
        <div class="sem sem-g ${totalScore()>=16?'on':''}" id="sem-g"><span class="sem-score">16–20</span>Ruta integral</div>
      </div>
      <div class="divider"></div>
      ${crit.map(cr=>`
      <div class="rating-group">
        <div class="rating-label">${cr.label}</div>
        <div class="rating-q">${cr.q}</div>
        <div class="stars" id="stars_${cr.id}">
          ${[1,2,3,4,5].map(v=>`<div class="star${state.ratings[cr.id]>=v?' on':''}" onclick="setRating('${cr.id}',${v})">${v}</div>`).join('')}
        </div>
        <textarea class="just-input" rows="1" placeholder="Justificación breve…" oninput="state.just['${cr.id}']=this.value">${state.just[cr.id]||''}</textarea>
      </div>`).join('')}
      <div id="mat-fb"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="goBack()">← Atrás</button>
      <button class="btn btn-primary" onclick="goNext()">Analizar con IA →</button>
    </div>`;
  }

  if(s.id==='riesgos') {
    c.innerHTML = `<div class="card">
      <div class="card-header">
        <span class="card-tag">Paso 5 · Riesgos</span>
        <div class="card-title">Puntos ciegos</div>
        <div class="card-sub">Nombra lo que debes asumir y lo que puede salir mal</div>
      </div>
      ${field('supuesto_clave','Supuesto clave','— ¿qué tiene que pasar afuera para que esto funcione?','Ej: Que el líder esté dispuesto a participar voluntariamente en el proceso',3)}
      ${field('riesgo_rebote','Riesgo de efecto rebote','— ¿podría la intervención reforzar la inmunidad?','Ej: Si el líder percibe que el rol de Mentor Senior es decorativo, puede sentirse más amenazado y aumentar el control',3)}
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="goBack()">← Atrás</button>
      <button class="btn btn-primary" onclick="goNext()">Ver resultado →</button>
    </div>`;
  }

  if(s.id==='cierre') {
    const score = totalScore();
    let em='🔴', semLabel='Ruta superficial — no toca la inmunidad interna', bubbleClass='danger';
    let bubbleMsg='El diseño actual no profundiza suficientemente en la inmunidad interna. Vuelve al diagnóstico y reformula el compromiso oculto y la Gran Suposición.';
    if(score>=16){ em='🟢'; semLabel='Ruta integral — ataca barreras externas e internas'; bubbleClass='success'; bubbleMsg='¡Excelente trabajo! Tu propuesta tiene coherencia interna y externa. Documenta los supuestos y asegura el experimento seguro antes de ejecutar.'; }
    else if(score>=11){ em='🟡'; semLabel='Ruta viable, pero frágil'; bubbleClass='warn'; bubbleMsg='Hay potencial, pero quedan puntos ciegos. Revisa los criterios con puntaje bajo y verifica si la acción de desbloqueo hace frente real a la Gran Suposición.'; }

    c.innerHTML = `<div class="card">
      <div class="trophy-block">
        <span class="trophy-em">${em}</span>
        <div class="trophy-title">${semLabel}</div>
        <div class="trophy-score">${score}<span style="font-size:20px;color:var(--gray-400)">/20</span></div>
        <div class="trophy-sub">${state.data.nombre_proyecto||'Tu proyecto'}</div>
      </div>
      <div class="ai-bubble ${bubbleClass}" style="margin-top:12px">${bubbleMsg}</div>
      <div id="cierre-fb"></div>
      <div class="divider"></div>
      <div class="btn-row" style="justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="goToStep(0)">← Revisar desde el inicio</button>
        <button class="btn btn-teal" onclick="callAI(buildPrompt(5),'cierre-fb')">Análisis final con IA ↗</button>
      </div>
    </div>`;
  }

  buildTabs();
  updateScorePill();
}

function goToStep(n) {
  state.step = n;
  renderStep();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack() { if(state.step>0) goToStep(state.step-1); }

function goNext() {
  if(!validateStep()) return;
  const cur = state.step;
  if(cur===1) {
    callAI(buildPrompt(1),'diag-fb', ()=>goToStep(2));
  } else if(cur===2) {
    callAI(buildPrompt(2),'prop-fb', ()=>goToStep(3));
  } else if(cur===3) {
    callAI(buildPrompt(3),'mat-fb', ()=>goToStep(4));
  } else {
    goToStep(cur+1);
  }
}

renderStep();
</script>
</body>
</html>
